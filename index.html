<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ai2html GitHub Pages Uploader</title>
    <link rel="stylesheet" href="styles.css?v=20260601-3">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <div class="panel upload-panel">
          <div class="title-row">
            <div>
              <h1>ai2html uploader</h1>
            </div>
          </div>

          <label class="drop-zone" id="drop-zone" for="folder-input">
            <input id="folder-input" type="file" webkitdirectory directory multiple>
            <span class="drop-icon" aria-hidden="true">+</span>
            <span class="drop-title">Drop an ai2html output folder</span>
            <span class="drop-copy">or choose a folder from your computer</span>
          </label>

          <div class="file-summary" id="file-summary" aria-live="polite">
            No folder selected yet.
          </div>
        </div>

        <form class="panel controls-panel" id="upload-form" autocomplete="off">
          <div class="destination-summary">
            <h2>Destination</h2>
            <p class="destination-repo">nckmourt/ai2html-uploader</p>
            <p>Uploads use the dropped folder name as the public folder slug.</p>
          </div>
          <div class="field-grid">
            <label class="wide">
              <span>Fine-grained personal access token</span>
              <input id="token" name="token" type="password" autocomplete="off" required placeholder="github_pat_...">
            </label>
          </div>

          <div class="button-row">
            <button type="submit" id="upload-button">Upload to GitHub</button>
            <button type="button" class="secondary" id="reset-button">Reset</button>
            <button type="button" class="secondary" id="copy-button" disabled>Copy embed code</button>
          </div>

          <div class="embed-output" aria-live="polite">
            <h2>Embed code</h2>
            <textarea id="embed-code" readonly placeholder="Your iframe embed code will appear here after upload."></textarea>
          </div>

          <div class="progress-log" id="progress-log" aria-live="polite">
            <p>Ready.</p>
          </div>
        </form>
      </section>

      <section class="panel preview-panel hidden" id="preview-panel" aria-live="polite">
        <div class="preview-header">
          <div class="preview-title-group">
            <h2>Preview</h2>
            <div class="preview-tabs" id="preview-tabs"></div>
          </div>
          <div class="artboard-controls" id="artboard-controls" hidden>
            <button type="button" class="secondary icon-button" id="prev-artboard" aria-label="Previous artboard">&lt;</button>
            <span id="artboard-label">Artboard</span>
            <button type="button" class="secondary icon-button" id="next-artboard" aria-label="Next artboard">&gt;</button>
          </div>
        </div>
        <div class="preview-frame-wrap">
          <iframe id="preview-frame" title="Local ai2html preview" sandbox="allow-scripts allow-same-origin"></iframe>
          <div class="preview-empty" id="preview-empty">Drop a folder to preview the detected graphic before uploading.</div>
        </div>
      </section>

    </main>

    <script src="app.js?v=20260603-1" type="module"></script>
  </body>
</html>
